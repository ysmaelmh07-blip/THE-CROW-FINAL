<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santa Isabel Cup - Official</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="ChatGPT Image 7 may 2026, 02_07_08 p.m..png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --cup-gold: #d4af37;
            --cup-gold-light: #f9e29b;
            --cup-dark: #0a0a0a;
        }

        body {
            background-color: var(--cup-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(10,10,10,1)), 
                        url('ChatGPT Image 7 may 2026, 02_07_08 p.m..png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid var(--cup-gold);
        }

        .btn-primary {
            background: linear-gradient(90deg, #8a6d3b, #d4af37, #8a6d3b);
            background-size: 200% auto;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.5s;
            color: black;
            font-weight: 900;
            text-transform: uppercase;
        }

        .btn-primary:hover {
            background-position: right center;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        .gold-text {
            background: linear-gradient(to bottom, #f9e29b 20%, #d4af37 50%, #8a6d3b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .card-glass:hover {
            border-color: var(--cup-gold);
            background: rgba(212, 175, 55, 0.05);
            transform: translateY(-5px);
        }

        .table-header {
            background: linear-gradient(90deg, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0) 100%);
            border-left: 4px solid var(--cup-gold);
        }

        .table-row {
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            transition: background 0.3s;
        }

        .view-transition { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .hidden-view { display: none; }

        /* Estilos para el Modal de Integrantes */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            overflow-y: auto;
            padding: 2rem;
        }
    </style>
</head>
<body>

    <!-- Navegación -->
    <nav class="fixed w-full z-[100] bg-black/90 border-b border-yellow-600/30 backdrop-blur-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4 cursor-pointer" onclick="showView('home')">
                <div class="h-10 w-10 bg-gradient-to-br from-yellow-400 to-yellow-700 rounded-full flex items-center justify-center border border-white/20">
                    <span class="text-black font-black font-orbitron">S</span>
                </div>
                <div class="leading-none">
                    <span class="block font-orbitron font-black text-xl italic tracking-tighter uppercase gold-text">SANTA ISABEL <span class="text-white">CUP</span></span>
                    <span class="text-[9px] font-bold text-zinc-500 tracking-[.4em] uppercase">Tournament Edition</span>
                </div>
            </div>
            <div class="hidden md:flex gap-8 items-center font-bold uppercase text-[12px] tracking-widest">
                <button onclick="showView('home')" class="hover:text-yellow-500 transition">Inicio</button>
                <button onclick="showView('teams')" class="hover:text-yellow-500 transition">Equipos</button>
                <button onclick="showView('stats')" class="hover:text-yellow-500 transition">Tabla</button>
                <button onclick="registerYourTeam()" class="bg-yellow-600 text-black px-4 py-2 rounded font-black hover:bg-yellow-500 transition">Inscribirse</button>
            </div>
        </div>
    </nav>

    <!-- VISTA: HOME -->
    <main id="view-home" class="view-transition">
        <section class="hero-section text-center px-6">
            <div class="max-w-4xl">
                <div class="inline-block px-4 py-1 border border-yellow-600/50 bg-yellow-600/10 text-yellow-500 font-bold text-xs tracking-[0.5em] uppercase mb-6 rounded-full">
                    Competencia de Élite
                </div>
                <h1 class="text-6xl md:text-9xl font-orbitron font-black italic mb-2 tracking-tighter uppercase leading-none gold-text">SANTA ISABEL</h1>
                <h2 class="text-5xl md:text-8xl font-orbitron font-black italic mb-8 tracking-tighter uppercase leading-none text-white">CUP 2026</h2>
                <div class="flex flex-col sm:flex-row gap-6 justify-center">
                    <button onclick="showView('teams')" class="btn-primary italic text-xl px-12 py-5">Ver Rivales</button>
                    <button onclick="registerYourTeam()" class="bg-white/5 hover:bg-white/10 border border-white/20 italic text-xl px-12 py-5 uppercase font-black transition-all">Formulario de Registro</button>
                </div>
            </div>
        </section>
    </main>

    <!-- VISTA: EQUIPOS -->
    <section id="view-teams" class="hidden-view py-32 container mx-auto px-6 view-transition">
        <div class="flex flex-col md:flex-row justify-between items-center mb-16 border-l-8 border-yellow-600 pl-6 gap-6">
            <div>
                <h2 class="text-6xl font-orbitron font-black italic uppercase tracking-tighter">EQUIPOS <span class="text-yellow-600">REGISTRADOS</span></h2>
                <p class="text-zinc-500 font-bold uppercase tracking-widest text-sm">Haz clic en el escudo para ver integrantes</p>
            </div>
        </div>
        <div id="teams-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Cargado por JS -->
        </div>
    </section>

    <!-- VISTA: TABLA -->
    <section id="view-stats" class="hidden-view py-32 container mx-auto px-6 view-transition">
        <div class="mb-16 border-l-8 border-yellow-600 pl-6">
            <h2 class="text-6xl font-orbitron font-black italic uppercase tracking-tighter text-white">TABLA DE <span class="text-yellow-600">POSICIONES</span></h2>
        </div>
        <div class="overflow-x-auto card-glass p-4 md:p-8">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="table-header text-yellow-500 font-orbitron uppercase text-sm tracking-widest">
                        <th class="py-4 px-6">Pos</th>
                        <th class="py-4 px-6">Equipo</th>
                        <th class="py-4 px-6 text-center">Kills</th>
                        <th class="py-4 px-6 text-center">Booyah</th>
                        <th class="py-4 px-6 text-center">Total Puntos</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>
    </section>

    <!-- MODAL DE INTEGRANTES -->
    <div id="team-modal" class="modal-overlay">
        <div class="container mx-auto max-w-5xl">
            <div class="flex justify-between items-center mb-12">
                <h2 id="modal-team-name" class="text-5xl font-orbitron font-black italic gold-text uppercase">EQUIPO</h2>
                <button onclick="closeModal()" class="text-white hover:text-yellow-500 text-4xl"><i class="fas fa-times"></i></button>
            </div>
            <div id="modal-players-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Jugadores inyectados aquí -->
            </div>
        </div>
    </div>

    <script>
        // BASE DE DATOS DEFINITIVA - CORRECCIONES APLICADAS
        const playersData = [
            { nick: 'KILLER', name: 'Beckham Laura', role: 'Granadero', img: 'ChatGPT Image 6 may 2026, 05_02_10 p.m..png' },
            { nick: 'DEADLYSHOT', name: 'Pool Munive', role: 'L2 / IGL', img: 'ChatGPT Image 6 may 2026, 06_33_47 p.m..png' },
            { nick: 'TRUE', name: 'Max Josué', role: 'Soporte', img: 'ChatGPT Image 6 may 2026, 06_52_44 p.m..png' },
            { nick: 'YISMA', name: 'Ysmael Marcos', role: 'Rusher L1', img: 'ChatGPT Image 6 may 2026, 09_14_24 p.m..png' },
            { nick: 'NEY', name: 'Anthony Marcos', role: 'Rusher', img: 'ChatGPT Image 6 may 2026, 09_37_28 p.m..png' },
            { nick: 'CHAVAL', name: 'Farit Mayorca', role: 'Soporte', img: null } // Imagen puesta en null para modo incógnito
        ];

        const squads = [
            { 
                id: 'the-crow', 
                name: 'THE CROW', 
                logo: 'logo de scuad.jpeg', 
                kills: 0, 
                booyahs: 0, 
                points: 0,
                players: playersData 
            }
        ];

        function registerYourTeam() {
            const googleFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSclftgFX0_6YCCcu9INSZlVYfFCJTF5In0tR6XERIp8wkCCPQ/viewform?usp=publish-editor"; 
            window.open(googleFormUrl, '_blank');
        }

        function showView(name) {
            ['home', 'teams', 'stats'].forEach(v => {
                const el = document.getElementById('view-' + v);
                if(el) el.classList.add('hidden-view');
            });
            const target = document.getElementById('view-' + name);
            if(target) target.classList.remove('hidden-view');
            window.scrollTo(0,0);
        }

        function openTeamDetails(squadId) {
            const squad = squads.find(s => s.id === squadId);
            if(!squad) return;

            document.getElementById('modal-team-name').innerText = squad.name;
            const grid = document.getElementById('modal-players-grid');
            
            grid.innerHTML = squad.players.map(p => `
                <div class="card-glass p-4 flex items-center gap-4">
                    <div class="w-20 h-20 bg-black rounded border border-yellow-600/30 overflow-hidden flex-shrink-0">
                        ${p.img ? 
                            `<img src="${p.img}" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<div class=\'w-full h-full flex items-center justify-center text-zinc-800 text-2xl\'><i class=\'fas fa-user-ninja\'></i></div>'">` : 
                            `<div class="w-full h-full flex items-center justify-center text-zinc-700 text-3xl bg-zinc-900"><i class="fas fa-user-secret"></i></div>`
                        }
                    </div>
                    <div>
                        <h4 class="text-xl font-orbitron font-black italic gold-text">${p.nick}</h4>
                        <p class="text-white text-xs font-bold opacity-70">${p.name}</p>
                        <p class="text-yellow-600 text-[10px] font-black uppercase tracking-tighter mt-1">${p.role}</p>
                    </div>
                </div>
            `).join('');

            document.getElementById('team-modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('team-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function loadLeaderboard() {
            const body = document.getElementById('leaderboard-body');
            if(!body) return;
            const sortedSquads = [...squads].sort((a, b) => b.points - a.points);
            body.innerHTML = sortedSquads.map((s, index) => `
                <tr class="table-row font-bold">
                    <td class="py-6 px-6 font-orbitron">#${index + 1}</td>
                    <td class="py-6 px-6">
                        <div class="flex items-center gap-4">
                            <img src="${s.logo}" class="w-10 h-10 rounded-full border border-yellow-600/30 object-cover" onerror="this.src='https://via.placeholder.com/40/000000/FFFFFF?text=TC'">
                            <span class="uppercase tracking-widest text-lg">${s.name}</span>
                        </div>
                    </td>
                    <td class="py-6 px-6 text-center text-zinc-400 font-orbitron">${s.kills}</td>
                    <td class="py-6 px-6 text-center text-yellow-600 font-orbitron">${s.booyahs}</td>
                    <td class="py-6 px-6 text-center font-orbitron text-xl">${s.points}</td>
                </tr>
            `).join('');
        }

        function loadTeams() {
            const grid = document.getElementById('teams-grid');
            if(!grid) return;
            grid.innerHTML = squads.map(s => `
                <div class="card-glass group overflow-hidden cursor-pointer" onclick="openTeamDetails('${s.id}')">
                    <div class="h-64 bg-black flex items-center justify-center relative overflow-hidden">
                        <img src="${s.logo}" class="w-full h-full object-cover opacity-60 group-hover:scale-110 group-hover:opacity-100 transition duration-700" onerror="this.src='https://via.placeholder.com/300/000000/FFFFFF?text=${s.name}'">
                        <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                             <span class="bg-yellow-600 text-black font-black px-4 py-2 uppercase italic skew-x-[-10deg]">Ver Integrantes</span>
                        </div>
                    </div>
                    <div class="p-6 text-center">
                        <h3 class="font-orbitron font-black text-3xl italic uppercase gold-text">${s.name}</h3>
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => {
            loadTeams();
            loadLeaderboard();
        };
    </script>
</body>
</html>
